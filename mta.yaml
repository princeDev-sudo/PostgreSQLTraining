_schema-version: 3.3.0
ID: PostgreSQLTraining
description: A simple CAP project.
version: 1.0.0
modules:
- name: PostgreSQLTraining-srv
  type: nodejs
  path: gen/srv
  requires:
  - name: PostgreSQLTraining-auth
  - name: PostgreSQLTraining-postgres
  provides:
  - name: srv-api
    properties:
      srv-url: ${default-url}
  parameters:
    buildpack: nodejs_buildpack
    instances: 1
    no-route: true
  build-parameters:
    builder: npm-ci
- name: PostgreSQLTraining-postgres-deployer
  type: nodejs
  path: gen/pg
  requires:
  - name: PostgreSQLTraining-postgres
  parameters:
    buildpack: nodejs_buildpack
    no-route: true
    no-start: true
    tasks:
    - command: npm start
      name: deploy-to-postgresql
- name: PostgreSQLTraining-app-content
  type: com.sap.application.content
  path: .
  requires:
  - name: PostgreSQLTraining-repo-host
    parameters:
      content-target: true
  build-parameters:
    build-result: resources
    requires:
    - artifacts:
      - user.zip
      name: user
      target-path: resources/
- name: user
  type: html5
  path: app/user
  build-parameters:
    build-result: dist
    builder: custom
    commands:
    - npm install
    - npm run build:cf
    supported-platforms: []
resources:
- name: PostgreSQLTraining-auth
  type: org.cloudfoundry.managed-service
  parameters:
    config:
      oauth2-configuration:
        credential-types:
        - binding-secret
        - x509
      tenant-mode: dedicated
      xsappname: PostgreSQLTraining-${org}-${space}
    path: ./xs-security.json
    service: xsuaa
    service-plan: application
- name: PostgreSQLTraining-postgres
  type: org.cloudfoundry.managed-service
  parameters:
    service: postgresql-db
    service-plan: trial
- name: PostgreSQLTraining-repo-host
  type: org.cloudfoundry.managed-service
  parameters:
    service: html5-apps-repo
    service-name: PostgreSQLTraining-html5-service
    service-plan: app-host
- name: PostgreSQLTraining-destination-service
  type: org.cloudfoundry.managed-service
  parameters:
    config:
      HTML5Runtime_enabled: false
      init_data:
        instance:
          destinations:
          - Authentication: NoAuthentication
            Name: ui5
            ProxyType: Internet
            Type: HTTP
            URL: https://ui5.sap.com
          existing_destinations_policy: update
      version: 1.0.0
    service: destination
    service-name: PostgreSQLTraining-destination-service
    service-plan: lite
parameters:
  deploy_mode: html5-repo
  enable-parallel-deployments: true
build-parameters:
  before-all:
  - builder: custom
    commands:
    - npm ci
    - npx cds build --production
